<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chess Bot</title>
    <!-- We use a different CDN that is often more compatible with GitHub's strict rules -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #222; color: #fff; text-align: center; font-family: sans-serif; }
        #board { width: 400px; margin: 20px auto; border: 5px solid #555; }
    </style>
</head>
<body>
    <h1>Chess vs Bot</h1>
    <div id="board"></div>
    <p id="status">Loading libraries...</p>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        // This wait function ensures the libraries are ready
        $(document).ready(function() {
            var board = null;
            var game = new Chess();
            var $status = $('#status');

            function onDrop (source, target) {
                var move = game.move({ from: source, to: target, promotion: 'q' });
                if (move === null) return 'snapback';
                $status.html("Bot is moving...");
                window.setTimeout(makeMove, 250);
            }

            function makeMove () {
                var moves = game.moves();
                if (moves.length === 0) return;
                game.move(moves[Math.floor(Math.random() * moves.length)]);
                board.position(game.fen());
                $status.html("Your turn");
            }

            board = Chessboard('board', {
                draggable: true,
                position: 'start',
                onDrop: onDrop,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            $status.html("Game Ready!");
        });
    </script>
</body>
</html>
