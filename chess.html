<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess vs Bot</title>
    <!-- Option A: The Security Fix -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://code.jquery.com https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com; img-src 'self' https://chessboardjs.com data:;">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { background: #313131; color: white; font-family: sans-serif; text-align: center; }
        #board { width: 400px; margin: 20px auto; }
    </style>
</head>
<body>

    <h2>JS Chess vs. Greedy Bot</h2>
    <div id="myBoard"></div>
    <div class="info">
        <p>Status: <span id="status">White to move</span></p>
        <button onclick="location.reload()">Reset Game</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var pieceValues = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 900 };

        function evaluateBoard(tempGame) {
            let totalEvaluation = 0;
            const boardState = tempGame.board();
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    let piece = boardState[i][j];
                    if (piece) {
                        let val = pieceValues[piece.type];
                        totalEvaluation += (piece.color === 'w' ? val : -val);
                    }
                }
            }
            return totalEvaluation;
        }

        function makeBotMove() {
            var possibleMoves = game.moves();
            if (possibleMoves.length === 0) return;

            var bestMove = null;
            var bestValue = 9999;

            possibleMoves.forEach(function(move) {
                game.move(move);
                var boardValue = evaluateBoard(game);
                if (boardValue < bestValue) {
                    bestValue = boardValue;
                    bestMove = move;
                }
                game.undo();
            });

            if (!bestMove) bestMove = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];

            game.move(bestMove);
            board.position(game.fen());
            updateStatus();
        }

        function onDrop(source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
            window.setTimeout(makeBotMove, 250);
        }

        function updateStatus() {
            var status = '';
            var moveColor = (game.turn() === 'w') ? 'White' : 'Black';
            if (game.in_checkmate()) status = 'Checkmate! ' + moveColor + ' lost.';
            else if (game.in_draw()) status = 'Draw!';
            else status = moveColor + ' to move';
            $status.html(status);
        }

        board = Chessboard('myBoard', {
            draggable: true,
            position: 'start',
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        });

        updateStatus();
    </script>
</body>
</html>
