<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chess vs Bot</title>
    <style>
        body { background: #313131; color: white; font-family: sans-serif; text-align: center; }
        #board { width: 400px; margin: 20px auto; max-width: 90vw; }
        /* Simple styling for the board squares since we aren't loading the external CSS */
        .white-1e1d7 { background-color: #f0d9b5; color: #b58863; }
        .black-3c85d { background-color: #b58863; color: #f0d9b5; }
    </style>
    <!-- Use a very reliable single-source script -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
</head>
<body>
    <h2>Chess Game</h2>
    <div id="board"></div>
    <p id="status">Loading Game...</p>

    <!-- This script is a "bundled" version to avoid security blocks -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">

    <script>
        // Check if libraries loaded
        window.onload = function() {
            if (typeof Chess === 'undefined' || typeof Chessboard === 'undefined') {
                document.getElementById('status').innerHTML = "Security error: Libraries blocked by browser.";
                return;
            }

            var board = null;
            var game = new Chess();

            function onDrop (source, target) {
                var move = game.move({ from: source, to: target, promotion: 'q' });
                if (move === null) return 'snapback';
                document.getElementById('status').innerHTML = "Bot is thinking...";
                window.setTimeout(makeRandomMove, 250);
            }

            function makeRandomMove () {
                var possibleMoves = game.moves();
                if (possibleMoves.length === 0) return;
                var randomIdx = Math.floor(Math.random() * possibleMoves.length);
                game.move(possibleMoves[randomIdx]);
                board.position(game.fen());
                document.getElementById('status').innerHTML = "Your turn";
            }

            board = Chessboard('board', {
                draggable: true,
                position: 'start',
                onDrop: onDrop,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
            document.getElementById('status').innerHTML = "Game Ready - You are White";
        };
    </script>
</body>
</html>
