<script>
    var board = null;  
    var game = new Chess();  

    function makeMove() {  
        const input = $('#moveInput');  
        const move = game.move(input.val().trim());  
        if (move) {  
            board.position(game.fen());  
            updateStatus();  
            input.val('');  
        } else {  
            alert("Strict Notation: e4, Nf3, Bb5, O-O");  
        }  
    }  

    $('#moveInput').on('keydown', (e) => { if (e.key === 'Enter') makeMove(); });  
    $('#moveBtn').on('click', makeMove);  

    function onDrop(source, target) {  
        const move = game.move({ from: source, to: target, promotion: 'q' });  
        if (move === null) return 'snapback';  
        updateStatus();  
    }  

    function updateStatus() {  
        $('#status').text(game.turn() === 'w' ? 'White to move' : 'Black to move');  
        let hist = game.history();  
        let html = '';  
        for (let i = 0; i < hist.length; i += 2) {  
            html += `<div>${Math.floor(i/2)+1}. ${hist[i]} ${hist[i+1] || ''}</div>`;  
        }  
        $('#moveHistory').html(html);  
    }  

    board = Chessboard('myBoard', {  
        draggable: true,  
        position: 'start',  
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',  
        onDrop: onDrop,  
        onSnapEnd: () => board.position(game.fen())  
    });  
</script>
