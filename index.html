<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Chess - GitHub Pages</title>
    <!-- Chessboard.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .game-container {
            display: flex;
            gap: 30px;
            background-color: #34495e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 900px;
            width: 95%;
            flex-wrap: wrap;
        }

        .board-section {
            flex: 1;
            min-width: 320px;
        }

        #myBoard {
            width: 100%;
            max-width: 400px;
            border: 4px solid #2c3e50;
            border-radius: 4px;
        }

        .info-section {
            width: 250px;
            display: flex;
            flex-direction: column;
        }

        .status-box {
            background-color: #2c3e50;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            border-left: 5px solid #f1c40f;
        }

        .history-box {
            background-color: #2c3e50;
            padding: 15px;
            border-radius: 8px;
            flex-grow: 1;
            height: 300px;
            display: flex;
            flex-direction: column;
        }

        .history-box h3 {
            margin-top: 0;
            font-size: 1.1rem;
            border-bottom: 1px solid #7f8c8d;
            padding-bottom: 10px;
        }

        #moveHistory {
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            padding-right: 5px;
        }

        .move-row {
            padding: 4px 0;
            border-bottom: 1px solid #34495e;
            display: flex;
        }

        .move-number {
            color: #95a5a6;
            width: 30px;
            display: inline-block;
        }

        .white-move {
            width: 80px;
        }

        .black-move {
            width: 80px;
        }

        /* Scrollbar Styling */
        #moveHistory::-webkit-scrollbar {
            width: 6px;
        }
        #moveHistory::-webkit-scrollbar-thumb {
            background: #7f8c8d;
            border-radius: 10px;
        }

        h2 { margin-top: 0; color: #f1c40f; }

        button {
            margin-top: 15px; 
            padding: 10px; 
            cursor: pointer; 
            background: #e67e22; 
            border: none; 
            color: white; 
            border-radius: 4px; 
            font-weight: bold;
        }
        button:hover {
            background: #d35400;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="board-section">
        <h2>JS Chess</h2>
        <div id="myBoard"></div>
    </div>

    <div class="info-section">
        <div class="status-box" id="status">White to move</div>
        
        <div class="history-box">
            <h3>Move History</h3>
            <div id="moveHistory"></div>
        </div>
        
        <button onclick="window.location.reload()">Reset Game</button>
    </div>
</div>

<!-- Dependencies -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
    // 1. Setup Logic
    var board = null;
    var game = new Chess();
    var $status = $('#status');
    var $history = $('#moveHistory');

    // 2. Piece Images (CDN)
    function getPieceUrl(piece) {
        return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + piece + '.png';
    }

    // 3. Logic: On piece pick up
    function onDragStart (source, piece, position, orientation) {
        if (game.game_over()) return false;
        if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
            (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
            return false;
        }
    }

    // 4. Logic: On piece drop
    function onDrop (source, target) {
        var move = game.move({
            from: source,
            to: target,
            promotion: 'q' 
        });

        if (move === null) return 'snapback';
        updateStatus();
    }

    // 5. Logic: Snap pieces (for castling/promotion)
    function onSnapEnd () {
        board.position(game.fen());
    }

    // 6. Update UI
    function updateStatus () {
        var status = '';
        var moveColor = (game.turn() === 'w') ? 'White' : 'Black';

        if (game.in_checkmate()) {
            status = 'Game over, ' + moveColor + ' is in checkmate.';
        } else if (game.in_draw()) {
            status = 'Game over, drawn position';
        } else {
            status = moveColor + ' to move';
            if (game.in_check()) status += ', ' + moveColor + ' is in check';
        }

        $status.html(status);

        // Update History HTML
        var history = game.history();
        var historyHtml = '';
        for (var i = 0; i < history.length; i += 2) {
            var moveNum = Math.floor(i / 2) + 1;
            var whiteMove = history[i];
            var blackMove = history[i + 1] ? history[i + 1] : '';
            
            historyHtml += '<div class="move-row">' +
                           '<span class="move-number">' + moveNum + '.</span>' +
                           '<span class="white-move">' + whiteMove + '</span>' +
                           '<span class="black-move">' + blackMove + '</span>' +
                           '</div>';
        }
        $history.html(historyHtml);
        $history.scrollTop($history[0].scrollHeight);
    }

    // 7. Initialize
    var config = {
        draggable: true,
        position: 'start',
        pieceTheme: getPieceUrl,
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd
    };
    board = Chessboard('myBoard', config);

    updateStatus();
</script>

</body>
</html>
