<script>
    var board = null;
    var game = new Chess();

    // Function to handle clicking a move in the history
    function goToMove(moveIndex) {
        const history = game.history();
        const movesToUndo = history.length - 1 - moveIndex;

        for (let i = 0; i < movesToUndo; i++) {
            game.undo();
        }
        
        board.position(game.fen());
        updateStatus();
    }

    function makeMove() {
        const input = $('#moveInput');
        const move = game.move(input.val().trim());
        if (move) {
            board.position(game.fen());
            updateStatus();
            input.val('');
        } else {
            alert("Strict Notation: e4, Nf3, Bb5, O-O");
        }
    }

    $('#moveInput').on('keydown', (e) => { if (e.key === 'Enter') makeMove(); });
    $('#moveBtn').on('click', makeMove);

    function onDrop(source, target) {
        const move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return 'snapback';
        updateStatus();
    }

    function updateStatus() {
        // Update Turn Status
        const status = game.turn() === 'w' ? 'White to move' : 'Black to move';
        if (game.in_checkmate()) {
            $('#status').text('Game Over: Checkmate');
        } else if (game.in_draw()) {
            $('#status').text('Game Over: Draw');
        } else {
            $('#status').text(status);
        }

        // Update Clickable History
        let hist = game.history();
        let html = '';
        
        for (let i = 0; i < hist.length; i += 2) {
            const moveNum = Math.floor(i / 2) + 1;
            
            // White's move
            const whiteMove = `<span class="history-move" onclick="goToMove(${i})">${hist[i]}</span>`;
            
            // Black's move (check if it exists)
            const blackMove = hist[i + 1] 
                ? `<span class="history-move" onclick="goToMove(${i + 1})">${hist[i + 1]}</span>` 
                : '';

            html += `<div>${moveNum}. ${whiteMove} ${blackMove}</div>`;
        }
        
        $('#moveHistory').html(html);
    }

    board = Chessboard('myBoard', {
        draggable: true,
        position: 'start',
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
        onDrop: onDrop,
        onSnapEnd: () => board.position(game.fen())
    });

    updateStatus();
</script>
