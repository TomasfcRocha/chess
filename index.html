<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess - Drag or Type</title>
    <!-- Chessboard.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .game-container {
            display: flex;
            gap: 30px;
            background-color: #34495e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 900px;
            width: 95%;
            flex-wrap: wrap;
        }

        .board-section {
            flex: 1;
            min-width: 320px;
        }

        #myBoard {
            width: 100%;
            max-width: 400px;
            border: 4px solid #2c3e50;
            border-radius: 4px;
        }

        .info-section {
            width: 250px;
            display: flex;
            flex-direction: column;
        }

        .input-group {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            border-radius: 4px;
            border: none;
            outline: none;
        }

        .status-box {
            background-color: #2c3e50;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            border-left: 5px solid #f1c40f;
        }

        .history-box {
            background-color: #2c3e50;
            padding: 15px;
            border-radius: 8px;
            flex-grow: 1;
            height: 250px;
            display: flex;
            flex-direction: column;
        }

        #moveHistory {
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
        }

        .move-row {
            padding: 4px 0;
            border-bottom: 1px solid #34495e;
            display: flex;
        }

        .move-number { color: #95a5a6; width: 30px; }
        .white-move, .black-move { width: 80px; }

        button {
            padding: 10px; 
            cursor: pointer; 
            background: #e67e22; 
            border: none; 
            color: white; 
            border-radius: 4px; 
            font-weight: bold;
        }
        button:hover { background: #d35400; }
        .btn-move { background: #27ae60; }
        .btn-move:hover { background: #2ecc71; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="board-section">
        <h2 style="margin-top:0; color:#f1c40f;">JS Chess</h2>
        <div id="myBoard"></div>
    </div>

    <div class="info-section">
        <div class="status-box" id="status">White to move</div>
        
        <div class="input-group">
            <input type="text" id="moveInput" placeholder="Enter move (e.g. e4)">
            <button class="btn-move" onclick="handleInputMove()">Move</button>
        </div>

        <div class="history-box">
            <h3 style="margin-top:0; font-size:1rem;">Move History</h3>
            <div id="moveHistory"></div>
        </div>
        
        <button style="margin-top:15px;" onclick="window.location.reload()">Reset Game</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
    var board = null;
    var game = new Chess();
    var $status = $('#status');
    var $history = $('#moveHistory');
    var $input = $('#moveInput');

    function getPieceUrl(piece) {
        return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + piece + '.png';
    }

    // Function to handle typed moves
    function handleInputMove() {
        var moveStr = $input.val();
        var move = game.move(moveStr);

        if (move === null) {
            alert("Invalid move: " + moveStr);
            $input.val('');
            return;
        }

        board.position(game.fen());
        $input.val('');
        updateStatus();
    }

    // Allow pressing "Enter" key to submit move
    $input.on('keypress', function(e) {
        if (e.which === 13) handleInputMove();
    });

    function onDragStart (source, piece, position, orientation) {
        if (game.game_over()) return false;
        if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
            (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
            return false;
        }
    }

    function onDrop (source, target) {
        var move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return 'snapback';
        updateStatus();
    }

    function onSnapEnd () {
        board.position(game.fen());
    }

    function updateStatus () {
        var status = '';
        var moveColor = (game.turn() === 'w') ? 'White' : 'Black';

        if (game.in_checkmate()) {
            status = 'Game over, ' + moveColor + ' is in checkmate.';
        } else if (game.in_draw()) {
            status = 'Game over, draw';
        } else {
            status = moveColor + ' to move';
            if (game.in_check()) status += ', ' + moveColor + ' is in check';
        }

        $status.html(status);

        var history = game.history();
        var historyHtml = '';
        for (var i = 0; i < history.length; i += 2) {
            var moveNum = Math.floor(i / 2) + 1;
            historyHtml += '<div class="move-row">' +
                           '<span class="move-number">' + moveNum + '.</span>' +
                           '<span class="white-move">' + history[i] + '</span>' +
                           '<span class="black-move">' + (history[i + 1] || '') + '</span>' +
                           '</div>';
        }
        $history.html(historyHtml);
        $history.scrollTop($history[0].scrollHeight);
    }

    var config = {
        draggable: true,
        position: 'start',
        pieceTheme: getPieceUrl,
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd
    };
    board = Chessboard('myBoard', config);
    updateStatus();
</script>
</body>
</html>
