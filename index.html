<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess - Engine Evaluation</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50; color: #ecf0f1;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .game-container {
            display: flex; gap: 20px; background-color: #34495e;
            padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 1000px; width: 95%; flex-wrap: wrap;
        }
        /* Evaluation Bar Styling */
        .eval-container {
            width: 30px; height: 400px; background-color: #000;
            border-radius: 4px; overflow: hidden; display: flex; flex-direction: column-reverse;
            border: 2px solid #2c3e50; position: relative;
        }
        #eval-fill {
            width: 100%; height: 50%; background-color: #fff;
            transition: height 0.5s ease-in-out;
        }
        #eval-text {
            position: absolute; width: 100%; text-align: center;
            bottom: 5px; font-size: 10px; color: #e67e22; font-weight: bold;
        }
        .board-section { flex: 1; min-width: 320px; }
        #myBoard { width: 100%; max-width: 400px; border: 4px solid #2c3e50; border-radius: 4px; }
        .info-section { width: 250px; display: flex; flex-direction: column; }
        .status-box {
            background-color: #2c3e50; padding: 15px; border-radius: 8px;
            margin-bottom: 20px; text-align: center; font-weight: bold;
            border-left: 5px solid #f1c40f;
        }
        .history-box {
            background-color: #2c3e50; padding: 15px; border-radius: 8px;
            flex-grow: 1; height: 180px; display: flex; flex-direction: column;
        }
        #moveHistory { overflow-y: auto; font-family: monospace; font-size: 14px; }
        .move-row { padding: 4px 5px; border-bottom: 1px solid #34495e; display: flex; cursor: pointer; }
        .move-row:hover { background: #465c71; }
        .move-number { color: #95a5a6; width: 30px; }
        .white-move, .black-move { width: 80px; }
        button {
            padding: 10px; cursor: pointer; background: #e67e22; 
            border: none; color: white; border-radius: 4px; font-weight: bold;
        }
        .btn-move { background: #27ae60; }
        .btn-flip { background: #9b59b6; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="game-container">
    <!-- Eval Bar -->
    <div class="eval-container">
        <div id="eval-fill"></div>
        <div id="eval-text">0.0</div>
    </div>

    <div class="board-section">
        <h2 style="margin:0 0 10px 0; color:#f1c40f;">JS Chess + Stockfish</h2>
        <div id="myBoard"></div>
    </div>

    <div class="info-section">
        <div class="status-box" id="status">White to move</div>
        
        <button class="btn-flip" onclick="board.orientation('flip')">🔄 Flip Board</button>

        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="text" id="moveInput" placeholder="Type move..." style="flex:1; padding:10px; border-radius:4px; border:none;">
            <button class="btn-move" onclick="handleInputMove()">Move</button>
        </div>

        <div class="history-box">
            <div id="moveHistory"></div>
        </div>
        
        <button style="margin-top:15px;" onclick="window.location.reload()">Reset Game</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
    var board = null;
    var game = new Chess();
    var stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

    // 1. Engine Communication
    stockfish.onmessage = function(event) {
        var line = event.data;
        if (line.includes('score cp')) {
            var score = parseInt(line.split('score cp ')[1].split(' ')[0]);
            updateEvalBar(score);
        } else if (line.includes('score mate')) {
            var mate = line.split('score mate ')[1].split(' ')[0];
            updateEvalBar(mate === '0' ? 0 : (mate > 0 ? 1000 : -1000), true);
        }
    };

    function updateEvalBar(cp, isMate = false) {
        var evalText = isMate ? 'M' + Math.abs(cp/1000) : (cp / 100).toFixed(1);
        document.getElementById('eval-text').innerText = evalText;
        
        // Convert centipawns to percentage (capped at +/- 500cp)
        var percentage = 50 + (cp / 20); 
        if (percentage > 100) percentage = 100;
        if (percentage < 0) percentage = 0;
        document.getElementById('eval-fill').style.height = percentage + '%';
    }

    function requestEval() {
        stockfish.postMessage('position fen ' + game.fen());
        stockfish.postMessage('go depth 12'); // Shallow depth for instant browser response
    }

    // 2. Game Logic
  function handleInputMove() {
        var moveStr = $input.val();
        var move = game.move(moveStr);
        if (move === null) {
            alert("Invalid move: " + moveStr);
            $input.val('');
            return;
        }
        redoStack = []; 
        board.position(game.fen());
        $input.val('');
        updateStatus();
    }
    var move = game.move(moveStr);

    if (move === null) {
        alert("Invalid move: " + moveStr);
        $input.val('');
        return;
    }

    redoStack = []; 
    board.position(game.fen());
    $input.val('');
    updateStatus();
}

    function onDrop(source, target) {
        var move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return 'snapback';
        updateStatus();
    }

    function updateStatus() {
        var status = game.turn() === 'w' ? 'White to move' : 'Black to move';
        if (game.in_checkmate()) status = 'Checkmate!';
        $('#status').html(status);
        
        // Update history
        var history = game.history();
        var html = '';
        for (var i = 0; i < history.length; i += 2) {
            html += `<div class="move-row">${Math.floor(i/2)+1}. ${history[i]} ${history[i+1] || ''}</div>`;
        }
        $('#moveHistory').html(html);
        requestEval(); // Ask Stockfish what it thinks
    }

    var config = {
        draggable: true,
        position: 'start',
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
        onDrop: onDrop,
        onSnapEnd: function() { board.position(game.fen()) }
    };
    board = Chessboard('myBoard', config);
    requestEval();
</script>
</body>
</html>
