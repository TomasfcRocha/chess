<script>
    var board = null;
    var game = new Chess();
    var stockfish = null;

    async function initStockfish() {
        try {
            const response = await fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
            const script = await response.text();
            const blob = new Blob([script], { type: 'application/javascript' });
            stockfish = new Worker(URL.createObjectURL(blob));

            stockfish.onmessage = function(e) {
                const line = e.data;
                
                // Only parse lines that contain the actual score
                if (line.includes('depth') && line.includes('score')) {
                    if (line.includes('score cp')) {
                        // Extract centipawns specifically
                        let parts = line.split(' ');
                        let scoreIndex = parts.indexOf('cp') + 1;
                        let score = parseInt(parts[scoreIndex]);
                        
                        // Stockfish gives score from the side-to-move's perspective.
                        // We normalize it: positive = White winning, negative = Black winning.
                        if (game.turn() === 'b') score = -score;
                        updateEval(score);
                    } else if (line.includes('score mate')) {
                        let parts = line.split(' ');
                        let mateIndex = parts.indexOf('mate') + 1;
                        let mateIn = parseInt(parts[mateIndex]);
                        updateEval(mateIn > 0 ? 1000 : -1000, true);
                    }
                }
            };

            stockfish.postMessage('uci');
            stockfish.postMessage('ucinewgame');
            stockfish.postMessage('isready');
            requestEval();
        } catch (err) { console.log("Engine Load Error:", err); }
    }

    function updateEval(cp, isMate = false) {
        const evalDisplay = document.getElementById('eval-text');
        const fill = document.getElementById('eval-fill');
        
        // Display the score (e.g., +1.2 or -0.5)
        let displayScore = (cp / 100).toFixed(1);
        evalDisplay.innerText = isMate ? 'M' : (cp > 0 ? '+' + displayScore : displayScore);
        
        // Map the score to the bar (capped at +/- 5.0 for visual clarity)
        let pct = 50 + (cp / 20); 
        pct = Math.min(Math.max(pct, 2), 98); 
        fill.style.height = pct + '%';
        
        // Change text color for readability against white/black bar
        evalDisplay.style.color = pct > 50 ? '#000' : '#fff';
    }

    function requestEval() {
        if (!stockfish) return;
        // Ensure the engine stops previous calculations before starting new ones
        stockfish.postMessage('stop');
        stockfish.postMessage('position fen ' + game.fen());
        stockfish.postMessage('go depth 13');
    }

    function makeMove() {
        const input = $('#moveInput');
        const move = game.move(input.val().trim());
        if (move) {
            board.position(game.fen());
            updateStatus();
            input.val('');
        } else {
            alert("Strict Notation: e4, Nf3, Bb5, O-O");
        }
    }

    $('#moveInput').on('keydown', (e) => { if (e.key === 'Enter') makeMove(); });
    $('#moveBtn').on('click', makeMove);

    function onDrop(source, target) {
        const move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return 'snapback';
        updateStatus();
    }

    function updateStatus() {
        $('#status').text(game.turn() === 'w' ? 'White to move' : 'Black to move');
        let hist = game.history();
        let html = '';
        for (let i = 0; i < hist.length; i += 2) {
            html += `<div>${Math.floor(i/2)+1}. ${hist[i]} ${hist[i+1] || ''}</div>`;
        }
        $('#moveHistory').html(html);
        requestEval();
    }

    board = Chessboard('myBoard', {
        draggable: true,
        position: 'start',
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
        onDrop: onDrop,
        onSnapEnd: () => board.position(game.fen())
    });

    initStockfish();
</script>
