<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess - Engine & Enter Key</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c3e50; color: #ecf0f1;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .game-container {
            display: flex; gap: 20px; background-color: #34495e;
            padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 1000px; width: 95%; flex-wrap: wrap;
        }
        .eval-container {
            width: 30px; height: 400px; background-color: #000;
            border-radius: 4px; overflow: hidden; display: flex; flex-direction: column-reverse;
            border: 2px solid #2c3e50; position: relative;
        }
        #eval-fill {
            width: 100%; height: 50%; background-color: #fff;
            transition: height 0.7s ease-in-out;
        }
        #eval-text {
            position: absolute; width: 100%; text-align: center;
            top: 5px; font-size: 11px; color: #e67e22; font-weight: bold; z-index: 10;
        }
        .board-section { flex: 1; min-width: 320px; }
        #myBoard { width: 100%; max-width: 400px; border: 4px solid #2c3e50; border-radius: 4px; }
        .info-section { width: 250px; display: flex; flex-direction: column; }
        .status-box {
            background-color: #2c3e50; padding: 15px; border-radius: 8px;
            margin-bottom: 20px; text-align: center; font-weight: bold;
            border-left: 5px solid #f1c40f;
        }
        .history-box {
            background-color: #2c3e50; padding: 15px; border-radius: 8px;
            flex-grow: 1; height: 180px; display: flex; flex-direction: column;
        }
        #moveHistory { overflow-y: auto; font-family: monospace; font-size: 14px; }
        button {
            padding: 10px; cursor: pointer; background: #e67e22; 
            border: none; color: white; border-radius: 4px; font-weight: bold;
        }
        .btn-move { background: #27ae60; }
        .btn-flip { background: #9b59b6; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="eval-container">
        <div id="eval-text">0.0</div>
        <div id="eval-fill"></div>
    </div>

    <div class="board-section">
        <h2 style="margin:0 0 10px 0; color:#f1c40f;">JS Chess + Engine</h2>
        <div id="myBoard"></div>
    </div>

    <div class="info-section">
        <div class="status-box" id="status">White to move</div>
        
        <button class="btn-flip" onclick="board.orientation('flip')">🔄 Flip Board</button>

        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="text" id="moveInput" placeholder="Ex: e4, Nf3..." style="flex:1; padding:10px; border-radius:4px; border:none;">
            <button class="btn-move" id="moveBtn">Move</button>
        </div>

        <div class="history-box">
            <div id="moveHistory"></div>
        </div>
        
        <button style="margin-top:15px;" onclick="window.location.reload()">Reset Game</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
    var board = null;
    var game = new Chess();
    var stockfish = null;

    // --- Stockfish Setup ---
    async function initStockfish() {
        try {
            const response = await fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
            const script = await response.text();
            const blob = new Blob([script], { type: 'application/javascript' });
            stockfish = new Worker(URL.createObjectURL(blob));

            stockfish.onmessage = function(e) {
                if (e.data.includes('score cp')) {
                    let score = parseInt(e.data.split('score cp ')[1].split(' ')[0]);
                    if (game.turn() === 'b') score = -score;
                    updateEval(score);
                } else if (e.data.includes('score mate')) {
                    let mate = parseInt(e.data.split('score mate ')[1].split(' ')[0]);
                    updateEval(mate > 0 ? 1000 : -1000, true);
                }
            };
            stockfish.postMessage('uci');
            stockfish.postMessage('ucinewgame');
            requestEval();
        } catch (err) { console.log("Engine Load Error:", err); }
    }

    function updateEval(cp, isMate = false) {
        document.getElementById('eval-text').innerText = isMate ? 'M' : (cp / 100).toFixed(1);
        let pct = 50 + (cp / 20); 
        pct = Math.min(Math.max(pct, 5), 95); // Keep visible
        document.getElementById('eval-fill').style.height = pct + '%';
    }

    function requestEval() {
        if (!stockfish) return;
        stockfish.postMessage('position fen ' + game.fen());
        stockfish.postMessage('go depth 13');
    }

    // --- Move Logic ---
    function makeMove() {
        const input = $('#moveInput');
        const move = game.move(input.val().trim());
        if (move) {
            board.position(game.fen());
            updateStatus();
            input.val('');
        } else {
            alert("Invalid move! Case sensitive: Pawns = e4, Pieces = Nf3");
        }
    }

    // ENTER KEY TRIGGER
    $('#moveInput').on('keydown', (e) => { if (e.key === 'Enter') makeMove(); });
    $('#moveBtn').on('click', makeMove);

    function onDrop(source, target) {
        const move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return 'snapback';
        updateStatus();
    }

    function updateStatus() {
        $('#status').text(game.turn() === 'w' ? 'White to move' : 'Black to move');
        let hist = game.history();
        let html = '';
        for (let i = 0; i < hist.length; i += 2) {
            html += `<div>${Math.floor(i/2)+1}. ${hist[i]} ${hist[i+1] || ''}</div>`;
        }
        $('#moveHistory').html(html);
        requestEval();
    }

    board = Chessboard('myBoard', {
        draggable: true,
        position: 'start',
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
        onDrop: onDrop,
        onSnapEnd: () => board.position(game.fen())
    });

    initStockfish();
</script>
</body>
</html>
